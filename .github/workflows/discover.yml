name: Discover Position IDs

on:
  workflow_dispatch:
    inputs:
      start_id:
        description: 'Start ID'
        required: true
        default: '0'
      end_id:
        description: 'End ID'
        required: true
        default: '11000'
      parallelism:
        description: 'Parallel browser pages'
        required: true
        default: '5'

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=scraper

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Run ID discovery scan
        working-directory: scraper
        run: npx tsx src/discover-ids.ts ${{ inputs.start_id }} ${{ inputs.end_id }} ${{ inputs.parallelism }}
        timeout-minutes: 55

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discovered-ids
          path: data/discovered-ids.json
          retention-days: 90

      - name: Commit discovered IDs
        run: |
          git config user.name "VocationHub Bot"
          git config user.email "bot@vocationhubplus.dev"
          git add data/discovered-ids.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new data"
          else
            git commit -m "data: discovered position IDs from scan ${{ inputs.start_id }}-${{ inputs.end_id }}"
            git push
          fi

name: Test Church Directory Scrape

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=scraper

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Test church directory scrape
        working-directory: scraper
        run: npx tsx src/scrape-church-directory.ts test

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: church-directory-screenshots
          path: screenshots/
          retention-days: 7

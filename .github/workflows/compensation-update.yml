name: Compensation Data Update

on:
  workflow_dispatch:
    inputs:
      pdf_url:
        description: 'URL of CPG Compensation Report PDF'
        required: true
      year:
        description: 'Report year (e.g., 2024)'
        required: true

env:
  DB_RELEASE_TAG: db-latest

concurrency:
  group: data-collection
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci --workspace=web
          pip install -r scripts/requirements.txt

      - name: Download DB
        id: download-db
        run: |
          mkdir -p data
          if gh release view ${{ env.DB_RELEASE_TAG }} &>/dev/null; then
            gh release download ${{ env.DB_RELEASE_TAG }} -p vocationhub.db -D data/
            echo "db_found=true" >> $GITHUB_OUTPUT
          else
            echo "::notice::No DB release found -- starting fresh"
            echo "db_found=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download PDF
        run: curl -L -o /tmp/cpg-compensation.pdf "${{ github.event.inputs.pdf_url }}"

      - name: Parse compensation data
        run: python scripts/parse_cpg_compensation.py /tmp/cpg-compensation.pdf ${{ github.event.inputs.year }} --db-path data/vocationhub.db

      - name: Validate DB before upload
        run: |
          node -e "
            const Database = require('better-sqlite3');
            const db = new Database('data/vocationhub.db');
            const tables = db.prepare(\"SELECT name FROM sqlite_master WHERE type='table'\").all().map(r => r.name);
            const required = ['scraped_positions', 'scraper_meta'];
            for (const t of required) {
              if (!tables.includes(t)) { console.error('Missing required table: ' + t); process.exit(1); }
            }
            const posCount = db.prepare('SELECT COUNT(*) as c FROM scraped_positions').get().c;
            console.log('Positions in DB: ' + posCount);
            if (posCount === 0) { console.error('DB has 0 positions -- refusing to upload'); process.exit(1); }
            db.close();
          "

      - name: Upload vocationhub.db to release
        run: gh release upload ${{ env.DB_RELEASE_TAG }} data/vocationhub.db --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run enrichment
        run: node web/scripts/run-enrichment.js web/public/data/
        env:
          VOCATIONHUB_DB_PATH: data/vocationhub.db

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/enriched-positions.json web/public/data/enriched-extended.json
          git diff --staged --quiet || git commit -m "chore: update compensation data for ${{ github.event.inputs.year }}"
          git push

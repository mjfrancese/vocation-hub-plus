name: Compensation Data Update

on:
  workflow_dispatch:
    inputs:
      pdf_url:
        description: 'URL of CPG Compensation Report PDF'
        required: true
      year:
        description: 'Report year (e.g., 2024)'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci --workspace=web
          pip install -r scripts/requirements.txt

      - name: Download vocationhub.db from latest release
        run: gh release download db-latest --pattern 'vocationhub.db' --dir data/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download PDF
        run: curl -L -o /tmp/cpg-compensation.pdf "${{ github.event.inputs.pdf_url }}"

      - name: Parse compensation data
        run: python scripts/parse_cpg_compensation.py /tmp/cpg-compensation.pdf ${{ github.event.inputs.year }} --db-path data/vocationhub.db

      - name: Upload vocationhub.db to release
        run: |
          gh release delete db-latest --yes 2>/dev/null || true
          gh release create db-latest data/vocationhub.db --title "Latest DB" --notes "Updated by compensation-update workflow" --latest=false
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run enrichment
        run: node web/scripts/run-enrichment.js web/public/data/
        env:
          VOCATIONHUB_DB_PATH: data/vocationhub.db

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/enriched-positions.json web/public/data/enriched-extended.json
          git diff --staged --quiet || git commit -m "chore: update compensation data for ${{ github.event.inputs.year }}"
          git push

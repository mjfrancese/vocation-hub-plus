name: Deep Scrape Profiles

on:
  workflow_dispatch:
    inputs:
      chunk_index:
        description: 'Chunk index (0=first 200, 1=next 200, etc.)'
        required: true
        default: '0'
      chunk_size:
        description: 'Profiles per chunk'
        required: true
        default: '200'

permissions:
  contents: write

jobs:
  deep-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=scraper

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Run deep scrape
        working-directory: scraper
        run: npx tsx src/deep-scrape.ts ${{ inputs.chunk_index }} ${{ inputs.chunk_size }}
        timeout-minutes: 45

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profiles-chunk-${{ inputs.chunk_index }}
          path: data/profiles/
          retention-days: 90

      - name: Commit profile data
        run: |
          git config user.name "VocationHub Bot"
          git config user.email "bot@vocationhubplus.dev"
          git add data/profiles/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new data"
          else
            git commit -m "data: deep scrape chunk ${{ inputs.chunk_index }} profiles"
            git push
          fi

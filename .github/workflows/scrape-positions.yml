name: Scrape Positions

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

concurrency:
  group: scrape-positions
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Download vocationhub.db from latest release
        run: |
          mkdir -p data
          gh release download db-latest --pattern 'vocationhub.db' --dir data/ --clobber 2>/dev/null || echo "No DB release yet"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run scraper
        run: npm run scrape --workspace=scraper
        timeout-minutes: 30
        env:
          VOCATIONHUB_DB_PATH: ${{ github.workspace }}/data/vocationhub.db

      - name: Upload vocationhub.db to release
        run: gh release upload db-latest data/vocationhub.db --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Trigger build
        run: gh api repos/${{ github.repository }}/dispatches -f event_type=build
        env:
          GH_TOKEN: ${{ github.token }}

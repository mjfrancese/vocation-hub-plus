name: Build and Deploy

on:
  repository_dispatch:
    types: [build]
  schedule:
    - cron: '0 12 * * *'
  push:
    branches:
      - main
    paths:
      - 'web/src/**'
      - 'web/scripts/**'
      - 'web/public/**'
      - 'web/next.config.*'
      - 'web/package.json'
  workflow_dispatch:

concurrency:
  group: build-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download vocationhub.db from latest release
        run: |
          mkdir -p data
          gh release download db-latest --pattern 'vocationhub.db' --dir data/ --clobber 2>/dev/null || echo "No DB release yet"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run enrichment pipeline
        run: node web/scripts/run-enrichment.js web/public/data/
        env:
          VOCATIONHUB_DB_PATH: ${{ github.workspace }}/data/vocationhub.db

      - name: Generate clergy data
        run: node web/scripts/generate-clergy-data.js web/public/data/
        env:
          VOCATIONHUB_DB_PATH: ${{ github.workspace }}/data/vocationhub.db
          CLERGY_TOKEN_SECRET: ${{ secrets.CLERGY_TOKEN_SECRET }}

      - name: Run scraper tests
        run: npm run test --workspace=scraper

      - name: Lint frontend
        run: npm run lint --workspace=web

      - name: Build static export
        working-directory: web
        run: npx next build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ github.event.deployment.payload.web_url || 'https://vocationhub.plus/' }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5

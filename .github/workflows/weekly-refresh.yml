name: Weekly Detail Refresh

on:
  schedule:
    # Sunday at 3am UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Calculate how many chunks we need
  plan:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.calc.outputs.chunks }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate chunks
        id: calc
        run: |
          TOTAL=$(python3 -c "import json; d=json.load(open('data/discovered-ids.json')); print(len(d['validIds']))")
          CHUNK_SIZE=200
          NUM_CHUNKS=$(( (TOTAL + CHUNK_SIZE - 1) / CHUNK_SIZE ))
          # Create JSON array [0, 1, 2, ..., N-1]
          CHUNKS=$(python3 -c "import json; print(json.dumps(list(range($NUM_CHUNKS))))")
          echo "chunks=$CHUNKS" >> $GITHUB_OUTPUT
          echo "Total profiles: $TOTAL, Chunks: $NUM_CHUNKS"

  # Run each chunk in parallel
  scrape:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.plan.outputs.chunks) }}
      max-parallel: 3
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=scraper

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Run deep scrape chunk ${{ matrix.chunk }}
        working-directory: scraper
        run: npx tsx src/deep-scrape.ts ${{ matrix.chunk }} 200
        timeout-minutes: 35

      - name: Upload chunk results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profiles-chunk-${{ matrix.chunk }}
          path: data/profiles/
          retention-days: 90

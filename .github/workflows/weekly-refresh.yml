name: Weekly Detail Refresh

on:
  schedule:
    # Sunday at 3am UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      chunk_index:
        description: 'Chunk index (0-5, or "all" for sequential)'
        required: true
        default: 'all'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=scraper

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Download previous database
        uses: actions/download-artifact@v4
        with:
          name: vocationhub-db
          path: data/
        continue-on-error: true

      - name: Run deep scrape
        working-directory: scraper
        run: |
          CHUNK="${{ inputs.chunk_index || 'all' }}"
          if [ "$CHUNK" = "all" ]; then
            # Run all chunks sequentially, 200 each
            TOTAL=$(python3 -c "import json; d=json.load(open('../data/discovered-ids.json')); print(len(d['validIds']))")
            CHUNKS=$(( (TOTAL + 199) / 200 ))
            echo "Running $CHUNKS chunks ($TOTAL total profiles)"
            for i in $(seq 0 $((CHUNKS - 1))); do
              echo "=== Chunk $i ==="
              npx tsx src/deep-scrape.ts $i 200 || true
            done
          else
            npx tsx src/deep-scrape.ts $CHUNK 200
          fi
        timeout-minutes: 45

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-profiles
          path: data/profiles/
          retention-days: 90
          overwrite: true

      - name: Upload database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vocationhub-db
          path: data/positions.db
          retention-days: 90
          overwrite: true

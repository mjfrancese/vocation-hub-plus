name: Scan for New Position IDs

on:
  schedule:
    # Daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=scraper

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Determine scan range
        id: range
        run: |
          # Get the max known ID from discovered-ids.json
          MAX_ID=$(python3 -c "import json; d=json.load(open('data/discovered-ids.json')); print(max(d['validIds']))" 2>/dev/null || echo "10694")
          START_ID=$((MAX_ID + 1))
          END_ID=$((MAX_ID + 200))
          echo "start_id=$START_ID" >> $GITHUB_OUTPUT
          echo "end_id=$END_ID" >> $GITHUB_OUTPUT
          echo "Scanning for new IDs from $START_ID to $END_ID"

      - name: Scan for new IDs
        working-directory: scraper
        run: npx tsx src/discover-ids.ts ${{ steps.range.outputs.start_id }} ${{ steps.range.outputs.end_id }} 10
        timeout-minutes: 10

      - name: Merge new IDs into discovered-ids.json
        run: |
          python3 -c "
          import json, os
          # Load existing IDs
          existing = json.load(open('data/discovered-ids.json'))
          existing_ids = set(existing['validIds'])
          # Load newly discovered IDs (if any)
          new_file = 'data/discovered-ids.json'
          if os.path.exists(new_file):
            new_data = json.load(open(new_file))
            new_ids = set(new_data.get('validIds', []))
            merged = sorted(existing_ids | new_ids)
            if len(merged) > len(existing_ids):
              print(f'Found {len(merged) - len(existing_ids)} new IDs')
              existing['validIds'] = merged
              existing['totalFound'] = len(merged)
              json.dump(existing, open(new_file, 'w'), indent=2)
            else:
              print('No new IDs found')
          "

      - name: Commit if new IDs found
        run: |
          git config user.name "VocationHub Bot"
          git config user.email "bot@vocationhubplus.dev"
          git add data/discovered-ids.json
          if git diff --staged --quiet; then
            echo "No new IDs to commit"
          else
            git commit -m "data: discovered new position IDs $(date -u +%Y-%m-%d)"
            git push
          fi

name: Scrape Vocation Hub

on:
  schedule:
    # Search scrape + targeted detail scrape: twice daily
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install scraper dependencies
        run: npm ci --workspace=scraper

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Download previous database
        uses: actions/download-artifact@v8
        with:
          name: vocationhub-db
          path: data/
        continue-on-error: true

      - name: Run scraper
        working-directory: scraper
        run: npm run scrape
        timeout-minutes: 15

      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vocationhub-db
          path: data/positions.db
          retention-days: 90
          overwrite: true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scrape-screenshots
          path: screenshots/
          retention-days: 7
          overwrite: true

      - name: Copy JSON to web data directory
        run: |
          mkdir -p web/public/data
          cp -f scraper/output/*.json web/public/data/ 2>/dev/null || true

      - name: Merge profile data into frontend
        working-directory: scraper
        run: npx tsx src/merge-profiles.ts || echo "Profile merge skipped (no chunk data)"

      - name: Build registry, position map, and enrich positions
        working-directory: web
        run: node scripts/build-registry.js && node scripts/build-position-map.js && node scripts/enrich-positions.js

      - name: Commit and push data changes
        run: |
          git config user.name "VocationHub Bot"
          git config user.email "bot@vocationhubplus.dev"
          git add web/public/data/ web/public/data/church-registry.json web/public/data/position-church-map.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data: update positions from scrape $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi


name: Scrape Vocation Hub

on:
  schedule:
    # Search scrape + targeted detail scrape: twice daily
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install scraper dependencies
        run: npm ci --workspace=scraper

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Download previous database
        uses: actions/download-artifact@v8
        with:
          name: vocationhub-db
          path: data/
        continue-on-error: true

      - name: Run scraper
        working-directory: scraper
        run: npm run scrape
        timeout-minutes: 15

      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vocationhub-db
          path: data/positions.db
          retention-days: 90
          overwrite: true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scrape-screenshots
          path: screenshots/
          retention-days: 7
          overwrite: true

      - name: Copy JSON to web data directory
        run: |
          mkdir -p web/public/data
          cp -f scraper/output/*.json web/public/data/ 2>/dev/null || true

      - name: Merge profile data into frontend
        working-directory: scraper
        run: npx tsx src/merge-profiles.ts || echo "Profile merge skipped (no chunk data)"

      - name: Download vocationhub.db from latest release
        run: gh release download db-latest --pattern 'vocationhub.db' --dir data/ 2>/dev/null || echo "No DB release yet"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install web dependencies
        run: npm ci --workspace=web

      - name: Run enrichment
        working-directory: web
        run: node scripts/enrich-positions-v2.js

      - name: Generate clergy tokens
        working-directory: web
        run: node scripts/generate-clergy-tokens.js
        env:
          CLERGY_TOKEN_SECRET: ${{ secrets.CLERGY_TOKEN_SECRET }}

      - name: Commit and push data changes
        run: |
          git config user.name "VocationHub Bot"
          git config user.email "bot@vocationhubplus.dev"
          git add web/public/data/enriched-positions.json web/public/data/enriched-extended.json web/public/data/position-church-map.json
          git add web/public/data/clergy-tokens.json web/public/data/clergy-search-index.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
            echo "CHANGES=false" >> $GITHUB_ENV
          else
            git commit -m "data: update positions from scrape $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase --autostash
            git push
            echo "CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Trigger deploy
        if: env.CHANGES == 'true'
        run: gh workflow run "Deploy Frontend"
        env:
          GH_TOKEN: ${{ github.token }}


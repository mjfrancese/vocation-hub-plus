name: Scrape Vocation Hub

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Download previous database
        uses: actions/download-artifact@v4
        with:
          name: vocationhub-db
          path: data/
        continue-on-error: true

      - name: Run scraper
        working-directory: scraper
        run: npm run scrape
        timeout-minutes: 10

      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vocationhub-db
          path: data/positions.db
          retention-days: 90
          overwrite: true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-screenshots
          path: screenshots/
          retention-days: 7

      - name: Copy JSON to web data directory
        run: |
          mkdir -p web/public/data
          cp -f scraper/output/*.json web/public/data/ 2>/dev/null || true

      - name: Commit and push data changes
        run: |
          git config user.name "VocationHub Bot"
          git config user.email "bot@vocationhubplus.dev"
          git add web/public/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data: update positions from scrape $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

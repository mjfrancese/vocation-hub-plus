name: Monthly Data Refresh

on:
  schedule:
    - cron: '0 5 1 * *'  # 1st of month, 5am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # Parishes ~50min + clergy ~90min + enrichment ~10min

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm ci --workspace=web
          pip install -r scripts/requirements.txt

      - name: Download vocationhub.db from latest release
        run: gh release download db-latest --pattern 'vocationhub.db' --dir data/ 2>/dev/null || echo "No existing DB release (first run)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Import Asset Map
        run: cd web && node scripts/import-asset-map.js

      - name: Fetch ECDPlus parishes
        run: cd web && node scripts/fetch-ecdplus-parishes.js

      - name: Fetch ECDPlus clergy
        run: cd web && node scripts/fetch-ecdplus-clergy.js

      - name: Merge parishes
        run: cd web && node scripts/merge-parishes.js

      - name: Import parochial data
        run: cd web && node scripts/import-parochial-data.js

      - name: Upload vocationhub.db to release
        run: |
          gh release delete db-latest --yes 2>/dev/null || true
          gh release create db-latest data/vocationhub.db --title "Latest DB" --notes "Auto-updated by data-refresh workflow" --latest=false
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run enrichment
        run: cd web && node scripts/enrich-positions-v2.js

      - name: Generate clergy tokens
        working-directory: web
        run: node scripts/generate-clergy-tokens.js
        env:
          CLERGY_TOKEN_SECRET: ${{ secrets.CLERGY_TOKEN_SECRET }}

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/enriched-positions.json web/public/data/enriched-extended.json web/public/data/position-church-map.json
          git diff --staged --quiet || git commit -m "chore: monthly data refresh $(date +%Y-%m-%d)"
          git push

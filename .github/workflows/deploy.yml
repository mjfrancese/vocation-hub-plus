name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'web/public/data/**'
      - 'web/src/**'
      - 'web/package.json'
      - 'web/next.config.js'
      - 'web/tailwind.config.ts'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run scraper tests
        run: npm run test --workspace=scraper

      - name: Lint frontend
        run: npm run lint --workspace=web

      - name: Build registry, position map, and enrich positions
        working-directory: web
        run: node scripts/build-registry.js && node scripts/build-position-map.js && node scripts/enrich-positions.js

      - name: Build static export
        working-directory: web
        run: npx next build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ github.event.deployment.payload.web_url || 'https://vocationhub.plus/' }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
